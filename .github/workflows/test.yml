name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        # --extra pardiso pulls in pardiso-mkl-jax, so the Pardiso-specific tests run
        # instead of skipping.
        run: uv sync --locked --extra pardiso

      - name: Run tests
        run: uv run pytest
